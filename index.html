<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Spark OS | Telemetry & Control Suite</title>
    
    <!-- React & Babel Standalone CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "var(--color-primary)",
              "on-primary-container": "var(--color-on-primary-container)",
              tertiary: "var(--color-tertiary)",
              surface: "var(--color-surface)",
              "surface-dim": "var(--color-surface-dim)",
              "surface-container": "var(--color-surface-container)",
              "surface-container-low": "var(--color-surface-container-low)",
              "surface-container-high": "var(--color-surface-container-high)",
              "surface-container-highest": "var(--color-surface-container-highest)",
              "surface-container-lowest": "var(--color-surface-container-lowest)",
              "on-surface": "var(--color-on-surface)",
              "on-surface-variant": "var(--color-on-surface-variant)",
              "on-background": "var(--color-on-background)",
              secondary: "var(--color-secondary)",
              "secondary-container": "var(--color-secondary-container)",
              "outline-variant": "var(--color-outline-variant)",
              "outline": "var(--color-outline)",
              error: "var(--color-error)",
              "error-container": "var(--color-error-container)"
            },
            fontFamily: {
              sans: ['var(--font-sans)', 'sans-serif'],
              mono: ['Geist', 'monospace']
            },
            spacing: {
              "margin-desktop": "32px",
              "gutter": "16px",
              "margin-mobile": "16px",
              "container-padding": "24px",
              "unit": "4px"
            }
          }
        }
      }
    </script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Material Symbols and Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-surface text-on-surface selection:bg-tertiary selection:text-surface antialiased min-h-screen relative overflow-x-hidden">
    <div id="root">
        <!-- Root React mount point -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center font-sans">
                <div class="inline-block w-8 h-8 border-2 border-t-tertiary border-r-transparent border-b-tertiary border-l-transparent rounded-full animate-spin"></div>
                <div class="mt-4 text-on-surface-variant text-[11px] tracking-widest font-mono font-medium uppercase">COMPILE RUNTIME ORCHESTRATION...</div>
            </div>
        </div>
    </div>
    
    <!-- React App Logic -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
