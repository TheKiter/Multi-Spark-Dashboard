<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Spark Cluster Telemetry</title>
    
    <!-- React & Babel Standalone CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              spaceDark: '#020617',
              spaceCard: 'rgba(15, 23, 42, 0.45)',
              glowOrange: '#ff9100',
              glowViolet: '#8c00ff',
              healthy: '#22c55e',
              danger: '#ef4444',
            },
            fontFamily: {
              sans: ['Fira Sans', 'sans-serif'],
              mono: ['Fira Code', 'monospace']
            }
          }
        }
      }
    </script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts Fira Sans & Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-spaceDark text-slate-100 min-h-screen overflow-x-hidden antialiased relative">
    <!-- Glowing background elements for spatial depth -->
    <div class="bg-glow-sphere top-[-200px] left-[-200px]"></div>
    <div class="bg-glow-sphere-2 bottom-[-100px] right-[-100px]"></div>
    
    <div id="root">
        <!-- Root React mount point -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block w-10 h-10 border-4 border-t-purple-600 border-r-transparent border-b-purple-600 border-l-transparent rounded-full animate-spin"></div>
                <div class="mt-4 text-purple-400 font-semibold tracking-wider">LOADING ANTIGRAVITY TELEMETRY...</div>
            </div>
        </div>
    </div>
    
    <!-- React App Logic -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
