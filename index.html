<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordic Spark Cluster Telemetry</title>
    
    <!-- React & Babel Standalone CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              nordicBg: '#09090b',
              nordicCard: '#18181b',
              nordicBorder: '#27272a',
              nordicText: '#f4f4f5',
              nordicMuted: '#a1a1aa',
              nordicGreen: '#10b981',
              nordicRed: '#f43f5e',
              nordicBlue: '#3b82f6',
              nordicGold: '#f59e0b',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace']
            }
          }
        }
      }
    </script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter & Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-nordicBg text-nordicText min-h-screen overflow-x-hidden antialiased relative">
    <div class="bg-glow-sphere top-[-100px] left-[-100px]"></div>
    
    <div id="root">
        <!-- Root React mount point -->
        <div class="flex items-center justify-center min-h-screen bg-nordicBg">
            <div class="text-center font-sans">
                <div class="inline-block w-8 h-8 border border-t-zinc-100 border-r-transparent border-b-zinc-100 border-l-transparent rounded-full animate-spin"></div>
                <div class="mt-4 text-nordicMuted text-xs tracking-widest font-medium">TELEMETRY COMPILING...</div>
            </div>
        </div>
    </div>
    
    <!-- React App Logic -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
