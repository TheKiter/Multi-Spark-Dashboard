<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Spark Cluster Telemetry</title>
    
    <!-- React & Babel Standalone CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              spaBackground: '#FAF9F6', // Calming warm alabaster
              spaCard: 'rgba(255, 255, 255, 0.65)',
              spaText: '#2D3436', // Charcoal
              spaMuted: '#7F8C8D', // Soft grey
              spaPink: '#E8B4B8', // Rose Gold accent
              spaGreen: '#87A987', // Calm Sage Green
              spaGold: '#C5A059', // Champagne Gold
              spaCoral: '#D27D7D', // Soft Dusty Coral
            },
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
              mono: ['DM Mono', 'monospace']
            }
          }
        }
      }
    </script>
    
    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Cormorant Garamond, Montserrat & DM Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="bg-spaBackground text-spaText min-h-screen overflow-x-hidden antialiased relative">
    <!-- Glowing background elements for spatial depth -->
    <div class="bg-glow-sphere top-[-200px] left-[-200px]"></div>
    <div class="bg-glow-sphere-2 bottom-[-100px] right-[-100px]"></div>
    
    <div id="root">
        <!-- Root React mount point -->
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block w-10 h-10 border-2 border-t-spaPink border-r-transparent border-b-spaPink border-l-transparent rounded-full animate-spin"></div>
                <div class="mt-4 text-spaGold font-serif italic text-lg tracking-widest">SERENITY TELEMETRY CONNECTING...</div>
            </div>
        </div>
    </div>
    
    <!-- React App Logic -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
